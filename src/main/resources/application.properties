# ── Database ──────────────────────────────────────────────────────────────────
# Change the password to match your local MySQL root password.
spring.datasource.url=jdbc:mysql://localhost:3306/pup_sis?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA/Hibernate ─────────────────────────────────────────────────────────────
# "update" creates/alters tables automatically — fine for development.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
# Disable caching so template changes reload without restarting.
spring.thymeleaf.cache=false

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080