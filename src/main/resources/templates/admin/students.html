<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students - PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="has-topbar">

<div th:replace="~{fragments/topbar :: topbar}"></div>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <header class="top-header">
            <h2>Student Management</h2>
            <div class="header-right">
                <span sec:authentication="name"></span>
                <span class="role-badge admin">Administrator</span>
            </div>
        </header>

        <main class="content-area">

            <!-- Flash messages -->
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Page header row -->
            <div class="page-header-row">
                <div class="page-title">
                    <h3>Students</h3>
                    <p>Manage student records, course, and year level.</p>
                </div>
                <button class="btn-primary" onclick="openModal('newStudentModal')">
                    + New Student
                </button>
            </div>

            <!-- Search -->
            <form method="get" th:action="@{/admin/students}" class="search-form">
                <input type="text" name="search" th:value="${search}"
                       placeholder="Search by name...">
                <button type="submit">Search</button>
                <a th:if="${search != null and !search.isEmpty()}"
                   th:href="@{/admin/students}" class="clear-link">Clear</a>
            </form>

            <!-- Table -->
            <div class="table-wrapper">
                <table class="sis-table">
                    <thead>
                        <tr>
                            <th>Student Number</th>
                            <th>Full Name</th>
                            <th>Course</th>
                            <th>Year Level</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="5" class="table-empty">No student records found.</td>
                        </tr>
                        <tr th:each="s : ${students}">
                            <td th:text="${s.studentNumber}"></td>
                            <td th:text="${s.fullName}"></td>
                            <td th:text="${s.course != null ? s.course.code : '-'}"></td>
                            <td th:with="yr=${s.yearLevel}"
                                th:text="${yr == null ? '-' :
                                          yr == 1 ? '1st Year' :
                                          yr == 2 ? '2nd Year' :
                                          yr == 3 ? '3rd Year' : '4th Year'}">
                            </td>
                            <td class="table-actions">
                                <a th:href="@{/admin/students/{id}/edit(id=${s.id})}"
                                   class="btn-icon" title="Edit">✏</a>
                                <form th:action="@{/admin/students/{id}/delete(id=${s.id})}"
                                      method="post" style="display:inline"
                                      onsubmit="return confirm('Delete this student record?')">
                                    <button type="submit" class="btn-icon" title="Delete">🗑</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
</div>

<!-- New Student Modal -->
<div id="newStudentModal" class="modal-overlay" style="display:none">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal('newStudentModal')">✕</button>
        <h2 class="modal-title">New Student</h2>
        <form th:action="@{/admin/students}" method="post">
            <div class="modal-group">
                <label class="modal-label">Year Enrolled</label>
                <input type="number" id="snYear" name="studentYear" class="modal-input"
                       th:value="${currentYear}" min="2000" max="2099"
                       oninput="updatePreview()">
            </div>
            <div class="modal-group">
                <label class="modal-label">Student Sequence No.</label>
                <input type="number" id="snSeq" name="studentSeq" class="modal-input"
                       placeholder="e.g. 1" min="1" max="99999" required
                       oninput="updatePreview()">
            </div>
            <div class="modal-group">
                <label class="modal-label">Student Type</label>
                <select id="snType" name="studentType" class="modal-select"
                        onchange="updatePreview()">
                    <option value="0">Regular</option>
                    <option value="1">Irregular</option>
                </select>
            </div>

            <!-- Live preview of the generated student number -->
            <div class="modal-group">
                <label class="modal-label">Generated Student Number</label>
                <div id="snPreview" class="modal-preview">----</div>
            </div>

            <div class="modal-group">
                <label class="modal-label">Full Name</label>
                <input type="text" name="fullName" class="modal-input"
                       placeholder="LAST NAME, FIRST NAME" required>
            </div>
            <div class="modal-group">
                <label class="modal-label">Course</label>
                <select name="courseId" class="modal-select" required>
                    <option value="">Select course</option>
                    <option th:each="c : ${courses}"
                            th:value="${c.id}"
                            th:text="${c.code + ' - ' + c.name}"></option>
                </select>
            </div>
            <div class="modal-group">
                <label class="modal-label">Year Level</label>
                <select name="yearLevel" class="modal-select">
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-modal-cancel"
                        onclick="closeModal('newStudentModal')">Cancel</button>
                <button type="submit" class="btn-modal-save">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Student Modal - shown server-side when editStudent is in model -->
<div id="editStudentModal" class="modal-overlay"
     th:style="${editStudent != null ? 'display:flex' : 'display:none'}">
    <div class="modal-card" th:if="${editStudent != null}">
        <a th:href="@{/admin/students}" class="modal-close">✕</a>
        <h2 class="modal-title">Edit Student</h2>
        <form th:action="@{/admin/students/{id}(id=${editStudent.id})}" method="post">
            <div class="modal-group">
                <label class="modal-label">Student Number</label>
                <input type="text" class="modal-input"
                       th:value="${editStudent.studentNumber}" disabled>
            </div>
            <div class="modal-group">
                <label class="modal-label">Full Name</label>
                <input type="text" name="fullName" class="modal-input"
                       th:value="${editStudent.fullName}" required>
            </div>
            <div class="modal-group">
                <label class="modal-label">Course</label>
                <select name="courseId" class="modal-select" required>
                    <option value="">Select course</option>
                    <option th:each="c : ${courses}"
                            th:value="${c.id}"
                            th:text="${c.code + ' - ' + c.name}"
                            th:selected="${editStudent.course != null
                                          and editStudent.course.id == c.id}">
                    </option>
                </select>
            </div>
            <div class="modal-group">
                <label class="modal-label">Year Level</label>
                <select name="yearLevel" class="modal-select">
                    <option value="1" th:selected="${editStudent.yearLevel == 1}">1st Year</option>
                    <option value="2" th:selected="${editStudent.yearLevel == 2}">2nd Year</option>
                    <option value="3" th:selected="${editStudent.yearLevel == 3}">3rd Year</option>
                    <option value="4" th:selected="${editStudent.yearLevel == 4}">4th Year</option>
                </select>
            </div>
            <div class="modal-actions">
                <a th:href="@{/admin/students}" class="btn-modal-cancel">Cancel</a>
                <button type="submit" class="btn-modal-save">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openModal(id) {
        document.getElementById(id).style.display = 'flex';
        if (id === 'newStudentModal') updatePreview();
    }
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }
    function updatePreview() {
        const year  = document.getElementById('snYear').value  || '----';
        const seq   = document.getElementById('snSeq').value;
        const type  = document.getElementById('snType').value;
        const seqPadded = seq ? String(seq).padStart(5, '0') : '-----';
        document.getElementById('snPreview').textContent =
            year + '-' + seqPadded + '-SP-' + type;
    }
</script>

</body>
</html>
