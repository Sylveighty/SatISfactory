<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="has-topbar">
<div th:replace="~{fragments/topbar :: topbar}"></div>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">

        <header class="top-header">
            <h2>Admin Dashboard</h2>
            <div class="header-right">
                <span>Welcome, <strong th:text="${username}">admin</strong></span>
                <span class="role-badge admin">Administrator</span>
            </div>
        </header>

        <main class="content-area">

            <div class="page-title">
                <h3>System Overview</h3>
                <p th:text="'S.Y. ' + ${#dates.format(#dates.createNow(), 'yyyy')} + ' . Academic Records'">S.Y. 2025-2026 . Academic Records</p>
            </div>

            <!-- Stat cards -->
            <div class="dash-stats">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-body">
                        <div class="stat-value" th:text="${totalStudents}">0</div>
                        <div class="stat-label">Students</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👤</div>
                    <div class="stat-body">
                        <div class="stat-value" th:text="${totalFaculty}">0</div>
                        <div class="stat-label">Faculty</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📖</div>
                    <div class="stat-body">
                        <div class="stat-value" th:text="${totalSubjects}">0</div>
                        <div class="stat-label">Subjects</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🏫</div>
                    <div class="stat-body">
                        <div class="stat-value" th:text="${totalSections}">0</div>
                        <div class="stat-label">Sections</div>
                    </div>
                </div>
            </div>

            <!-- Announcements -->
            <div class="page-title" style="margin-top: 32px;">
                <h3>Active Announcements</h3>
            </div>
            <div th:if="${#lists.isEmpty(announcements)}" class="dash-empty">
                No active announcements. <a th:href="@{/admin/announcements}" style="color:var(--maroon);">Post one</a>.
            </div>
            <div th:each="a : ${announcements}" class="announcement-card">
                <div class="announcement-title" th:text="${a.title}"></div>
                <div class="announcement-date" th:text="${a.publishDate}"></div>
                <div class="announcement-body" th:text="${a.content}"></div>
            </div>

        </main>
    </div>
</div>
</body>
</html>
