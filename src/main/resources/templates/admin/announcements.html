<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Announcements - PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="has-topbar">

<div th:replace="~{fragments/topbar :: topbar}"></div>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <header class="top-header">
            <h2>Admin Panel</h2>
            <div class="header-right">
                <span sec:authentication="name"></span>
                <span class="role-badge admin">Administrator</span>
            </div>
        </header>

        <main class="content-area">

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <div class="page-header-row">
                <div class="page-title">
                    <h3>Announcements</h3>
                    <p>Post and manage announcements visible to all users.</p>
                </div>
                <button class="btn-primary" onclick="openModal('newAnnouncementModal')">
                    + New Announcement
                </button>
            </div>

            <div class="table-wrapper">
                <table class="sis-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Publish Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(announcements)}">
                            <td colspan="4" class="table-empty">No announcements yet.</td>
                        </tr>
                        <tr th:each="a : ${announcements}">
                            <td>
                                <div th:text="${a.title}" style="font-weight:500;"></div>
                                <div th:text="${a.content}" style="font-size:12px; color:var(--text-muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:400px;"></div>
                            </td>
                            <td th:text="${a.publishDate}"></td>
                            <td>
                                <span th:if="${a.active}" class="badge-active">Active</span>
                                <span th:if="${!a.active}" class="badge-inactive">Inactive</span>
                            </td>
                            <td class="table-actions">
                                <form th:action="@{/admin/announcements/{id}/toggle(id=${a.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn-table-edit"
                                            th:text="${a.active} ? 'Deactivate' : 'Activate'"></button>
                                </form>
                                <form th:action="@{/admin/announcements/{id}/delete(id=${a.id})}" method="post" style="display:inline;"
                                      onsubmit="return confirm('Delete this announcement?')">
                                    <button type="submit" class="btn-table-delete">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
</div>

<!-- New Announcement Modal -->
<div id="newAnnouncementModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
        <div class="modal-header">
            <h3>New Announcement</h3>
            <button class="modal-close" onclick="closeModal('newAnnouncementModal')">x</button>
        </div>
        <form th:action="@{/admin/announcements/create}" method="post">
            <div class="modal-body">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" class="profile-input" required maxlength="200">
                </div>
                <div class="form-group" style="margin-top:12px;">
                    <label>Content</label>
                    <textarea name="content" class="profile-textarea" rows="4" required></textarea>
                </div>
                <div class="form-group" style="margin-top:12px;">
                    <label>Publish Date</label>
                    <input type="date" name="publishDate" class="profile-input" required
                           th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-modal-cancel"
                        onclick="closeModal('newAnnouncementModal')">Cancel</button>
                <button type="submit" class="btn-modal-save">Post Announcement</button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/scripts :: jquery}"></div>
<script>
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
