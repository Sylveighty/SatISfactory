<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Curriculum - PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="has-topbar">

<div th:replace="~{fragments/topbar :: topbar}"></div>

<div class="app-layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <header class="top-header">
            <h2>Curriculum Management</h2>

            <div class="header-right">
                <span sec:authentication="name"></span>
                <span class="role-badge admin">Administrator</span>
            </div>
        </header>

        <main class="content-area">

            <div th:if="${success}" class="alert alert-success"
                 th:text="${success}"></div>

            <div th:if="${error}" class="alert alert-error"
                 th:text="${error}"></div>

            <div class="page-header-row">

                <div class="page-title">
                    <h3>Curriculum</h3>
                    <p>Manage courses and view their assigned subjects.</p>
                </div>

                <button class="btn-primary"
                        onclick="openModal('newCourseModal')">
                    + New Course
                </button>

            </div>

            <div th:each="entry : ${curriculumMap}"
                 class="curriculum-block">

                <div class="curriculum-course-header">

                    <div>

                        <h4 th:text="${entry.key.code + ' - ' + entry.key.name}"></h4>

                        <small th:text="${#lists.size(entry.value) + ' subject(s)'}">
                        </small>

                    </div>

                    <div class="table-actions">

                        <a class="btn-icon"
                           title="Edit"
                           th:href="@{/admin/curriculum/{id}/edit(id=${entry.key.id})}">
                            ✏
                        </a>

                        <form
                                th:action="@{/admin/curriculum/{id}/delete(id=${entry.key.id})}"
                                method="post"
                                style="display:inline"
                                onsubmit="return confirm('Delete this course?')">

                            <button
                                    class="btn-icon"
                                    type="submit"
                                    title="Delete">

                                🗑

                            </button>

                        </form>

                    </div>

                </div>

                <div th:if="${#lists.isEmpty(entry.value)}"
                     class="curriculum-empty">

                    No subjects assigned to this course yet.

                    <a th:href="@{/admin/subjects}">
                        Go to Subjects →
                    </a>

                </div>

                <div th:if="${!#lists.isEmpty(entry.value)}"
                     class="table-wrapper">

                    <table class="sis-table">

                        <thead>

                        <tr>
                            <th>Code</th>
                            <th>Subject Name</th>
                            <th>Units</th>
                            <th>Lec</th>
                            <th>Lab</th>
                            <th>Tuition</th>
                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="s : ${entry.value}">

                            <td th:text="${s.code}"></td>

                            <td th:text="${s.name}"></td>

                            <td th:text="${s.units}"></td>

                            <td th:text="${s.lecHours}"></td>

                            <td th:text="${s.labHours}"></td>

                            <td th:text="${s.tuitionHours}"></td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>
                        <!-- New Course Modal -->
            <div id="newCourseModal" class="modal-overlay" style="display:none">
                <div class="modal-card">

                    <button class="modal-close"
                            onclick="closeModal('newCourseModal')">
                        ✕
                    </button>

                    <h2 class="modal-title">New Course</h2>

                    <form th:action="@{/admin/curriculum}" method="post">

                        <div class="modal-group">
                            <label class="modal-label">Course Code</label>
                            <input
                                    type="text"
                                    name="code"
                                    class="modal-input"
                                    placeholder="e.g. BSIT"
                                    required>
                        </div>

                        <div class="modal-group">
                            <label class="modal-label">Course Name</label>
                            <input
                                    type="text"
                                    name="name"
                                    class="modal-input"
                                    placeholder="e.g. Bachelor of Science in Information Technology"
                                    required>
                        </div>

                        <div class="modal-actions">

                            <button
                                    type="button"
                                    class="btn-modal-cancel"
                                    onclick="closeModal('newCourseModal')">

                                Cancel

                            </button>

                            <button
                                    type="submit"
                                    class="btn-modal-save">

                                Save

                            </button>

                        </div>

                    </form>

                </div>
            </div>

            <!-- Edit Course Modal -->
            <div id="editCourseModal"
                 class="modal-overlay"
                 th:style="${editCourse != null ? 'display:flex' : 'display:none'}">

                <div class="modal-card"
                     th:if="${editCourse != null}">

                    <a th:href="@{/admin/curriculum}"
                       class="modal-close">

                        ✕

                    </a>

                    <h2 class="modal-title">
                        Edit Course
                    </h2>

                    <form
                            th:action="@{/admin/curriculum/{id}(id=${editCourse.id})}"
                            method="post">

                        <div class="modal-group">

                            <label class="modal-label">
                                Course Code
                            </label>

                            <input
                                    type="text"
                                    name="code"
                                    class="modal-input"
                                    th:value="${editCourse.code}"
                                    required>

                        </div>

                        <div class="modal-group">

                            <label class="modal-label">
                                Course Name
                            </label>

                            <input
                                    type="text"
                                    name="name"
                                    class="modal-input"
                                    th:value="${editCourse.name}"
                                    required>

                        </div>

                        <div class="modal-actions">

                            <a
                                    th:href="@{/admin/curriculum}"
                                    class="btn-modal-cancel">

                                Cancel

                            </a>

                            <button
                                    type="submit"
                                    class="btn-modal-save">

                                Save

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </main>

    </div>

</div>

<script>

    function openModal(id) {
        document.getElementById(id).style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

</script>

</body>
</html>
