<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Class Lists</title>
    <meta charset="UTF-8">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

    <a th:href="@{/faculty/classes}"
       class="btn btn-secondary mb-3">

        ← Back to Sections

    </a>

    <h2>Class Lists</h2>

    <p class="text-muted">
        Students enrolled in
        <strong th:text="${section.sectionName}">
            BSIT 3-1
        </strong>
    </p>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

        <tr>
            <th>#</th>
            <th>Student Number</th>
            <th>Student Name</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="student, stat : ${students}">

            <td th:text="${stat.count}">1</td>

            <td th:text="${student.studentNumber}">
                2023-00001
            </td>

            <td th:text="${student.lastName + ', ' + student.firstName}">
                Juan Dela Cruz
            </td>

        </tr>

        </tbody>

    </table>

    <div class="alert alert-info"
         th:if="${#lists.isEmpty(students)}">

        No students enrolled in this section.

    </div>

</div>

</body>
</html>
