<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inbox - PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="has-topbar">

<div th:replace="~{fragments/topbar :: topbar}"></div>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <header class="top-header">
            <h2>Faculty Portal</h2>
            <div class="header-right">
                <span sec:authentication="name"></span>
                <span class="role-badge faculty">Faculty</span>
            </div>
        </header>

        <main class="content-area">

            <div class="page-title">
                <h3>Inbox
                    <span th:if="${unreadCount > 0}" class="unread-badge"
                          th:text="${unreadCount}"></span>
                </h3>
                <p>Click a message to expand it.</p>
            </div>

            <div th:if="${#lists.isEmpty(messages)}" class="dash-empty">
                Your inbox is empty.
            </div>

            <div th:each="m : ${messages}" class="inbox-item"
                 th:classappend="${!m.read} ? ' inbox-item-unread' : ''">
                <div class="inbox-item-header" onclick="toggleMessage(this)">
                    <div>
                        <span class="inbox-item-subject" th:text="${m.subject}"></span>
                        <span th:if="${!m.read}" class="unread-dot"></span>
                    </div>
                    <span class="inbox-item-date" th:text="${m.sentAt.toLocalDate()}"></span>
                </div>
                <div class="inbox-item-body" style="display:none;">
                    <div class="inbox-item-from" th:text="'From: ' + ${m.sender.username}"></div>
                    <div class="inbox-item-content" th:text="${m.body}"></div>
                    <form th:if="${!m.read}"
                          th:action="@{/faculty/inbox/{id}/read(id=${m.id})}" method="post"
                          style="margin-top:8px;">
                        <button type="submit" class="btn-table-edit">Mark as Read</button>
                    </form>
                </div>
            </div>

        </main>
    </div>
</div>

<script>
    function toggleMessage(el) {
        const body = el.nextElementSibling;
        body.style.display = body.style.display === 'none' ? 'block' : 'none';
    }
</script>

</body>
</html>
