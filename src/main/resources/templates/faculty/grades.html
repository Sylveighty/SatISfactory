<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Grade Encoding</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<div class="container mt-4">

    <h2>Grade Encoding</h2>

    <p class="text-muted">
        Encode final grades for your assigned classes.
    </p>

    <form method="get"
          th:action="@{/faculty/grades}"
          class="row g-3 mb-4">

        <div class="col-md-6">

            <label class="form-label">
                Subject
            </label>

            <select id="subjectSelect"
                    name="subjectId"
                    class="form-select">

                <option value="">
                    Select Subject
                </option>

                <option th:each="schedule : ${schedules}"
                        th:value="${schedule.subject.id}"
                        th:text="${schedule.subject.code + ' - ' + schedule.subject.name}">
                </option>

            </select>

        </div>

        <div class="col-md-6">

            <label class="form-label">
                Section
            </label>

            <select id="sectionSelect"
                    name="sectionId"
                    class="form-select">

                <option value="">
                    Select Section
                </option>

            </select>

        </div>

        <div class="col-12">

            <button class="btn btn-primary">
                Load Students
            </button>

        </div>

    </form>

    <div th:if="${students != null}">

        <form method="post"
              th:action="@{/faculty/grades}">

            <input type="hidden"
                   name="subjectId"
                   th:value="${selectedSubject.id}">

            <input type="hidden"
                   name="sectionId"
                   th:value="${selectedSection.id}">

            <table class="table table-bordered">

                <thead>
                <tr>
                    <th>#</th>
                    <th>Student Number</th>
                    <th>Student Name</th>
                    <th>Final Grade</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="student, stat : ${students}">

                    <td th:text="${stat.count}"></td>

                    <td th:text="${student.studentNumber}"></td>

                    <td th:text="${student.fullName}"></td>

                    <td>

                        <select class="form-select"
                                th:name="${'grade_' + student.id}">

                            <option value="">Select</option>

                            <option>1.0</option>
                            <option>1.25</option>
                            <option>1.5</option>
                            <option>1.75</option>
                            <option>2.0</option>
                            <option>2.25</option>
                            <option>2.5</option>
                            <option>2.75</option>
                            <option>3.0</option>
                            <option>5.0</option>
                            <option>INC</option>
                            <option>DRP</option>

                        </select>

                    </td>

                </tr>

                </tbody>

            </table>

            <div class="text-end">

                <button type="submit"
                        class="btn btn-success">

                    Submit Grades

                </button>

            </div>

        </form>

    </div>

</div>

<script>

$("#subjectSelect").change(function() {

    const subjectId = $(this).val();

    $.get(
        "/faculty/grade-sections",
        { subjectId: subjectId },
        function(sections) {

            let html =
                '<option value="">Select Section</option>';

            sections.forEach(function(section) {

                html +=
                    `<option value="${section.id}">
                        ${section.sectionName}
                    </option>`;
            });

            $("#sectionSelect").html(html);
        }
    );
});

</script>

</body>
</html>
