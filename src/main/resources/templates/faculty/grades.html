<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Encode Grades - PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="has-topbar">

<div th:replace="~{fragments/topbar :: topbar}"></div>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <header class="top-header">
            <h2>Faculty Portal</h2>
            <div class="header-right">
                <span sec:authentication="name"></span>
                <span class="role-badge faculty">Faculty</span>
            </div>
        </header>

        <main class="content-area">

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="page-title">
                <h3>Encode Grades</h3>
                <p>Select a subject and section, then assign a final grade to each student.</p>
            </div>

            <form method="get" th:action="@{/faculty/grades}" class="modal-row-two" style="max-width: 600px; margin-bottom: 20px">
                <div class="modal-group">
                    <label class="modal-label" style="color: var(--text-muted)">Course</label>
                    <select name="subjectId" id="gradeSubjectSelect" class="filter-select" onchange="this.form.submit()">
                        <option value="">Select Course</option>
                        <option th:each="sub : ${subjects}" th:value="${sub.id}"
                                th:text="${sub.code + ' - ' + sub.name}"
                                th:selected="${selectedSubjectId == sub.id}"></option>
                    </select>
                </div>
                <div class="modal-group">
                    <label class="modal-label" style="color: var(--text-muted)">Section</label>
                    <select name="sectionId" id="gradeSectionSelect" class="filter-select" onchange="this.form.submit()">
                        <option value="">Select Section</option>
                        <option th:if="${section != null}" th:value="${section.id}"
                                th:text="${section.sectionName}" selected></option>
                    </select>
                </div>
            </form>

            <div th:if="${section != null and subject != null}">

                <form th:action="@{/faculty/grades}" method="post">
                    <input type="hidden" name="sectionId" th:value="${section.id}">
                    <input type="hidden" name="subjectId" th:value="${subject.id}">

                    <div class="table-wrapper">
                        <table class="sis-table">
                            <thead>
                                <tr>
                                    <th th:text="${section.sectionName + ' · ' + subject.code + ' - ' + subject.name}"
                                        colspan="3"></th>
                                </tr>
                                <tr>
                                    <th>#</th>
                                    <th>Student</th>
                                    <th>Final Grade</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(students)}">
                                    <td colspan="3" class="table-empty">No students in this section.</td>
                                </tr>
                                <tr th:each="st, iter : ${students}">
                                    <td th:text="${iter.count}" style="width: 40px"></td>
                                    <td th:text="${st.fullName}"></td>
                                    <td>
                                        <input type="hidden" th:name="studentIds" th:value="${st.id}">
                                        <select th:name="'grades[' + ${st.id} + ']'" class="grade-selector">
                                            <option value="">Select grade</option>
                                            <option th:each="g : ${ {'1.0','1.25','1.5','1.75','2.0','2.25','2.5','2.75','3.0','5.0','INC','DRP'} }"
                                                    th:value="${g}" th:text="${g}"
                                                    th:selected="${existingGrades[st.id] != null and existingGrades[st.id].finalGrade == g}"></option>
                                        </select>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="modal-actions" style="margin-top: 16px; justify-content: flex-end">
                        <button type="submit" class="btn-modal-save"
                                style="background: var(--maroon); color: white;">Submit Grades</button>
                    </div>
                </form>
            </div>

        </main>
    </div>
</div>

<div th:replace="~{fragments/scripts :: jquery}"></div>

<script th:inline="javascript">
    const facultyId = /*[[${faculty != null ? faculty.id : ''}]]*/ '';

    $('#gradeSubjectSelect').on('change', function() {
        const subjectId = $(this).val();
        const $sectionSelect = $('#gradeSectionSelect');
        $sectionSelect.empty().append('<option value="">Select Section</option>');
        if (!subjectId || !facultyId) return;

        $.get('/api/sections?facultyId=' + facultyId + '&subjectId=' + subjectId, function(data) {
            $.each(data, function(i, sec) {
                $sectionSelect.append($('<option>', { value: sec.id, text: sec.name }));
            });
        });
    });
</script>

</body>
</html>
