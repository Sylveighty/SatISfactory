<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Class Lists</title>
    <meta charset="UTF-8">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

    <h2>Class Lists</h2>
    <p class="text-muted">
        Sections currently assigned to you.
    </p>

    <div class="row">

        <div class="col-md-4 mb-3"
             th:each="schedule : ${schedules}">

            <div class="card shadow-sm h-100">

                <div class="card-body">

                    <h5 class="card-title"
                        th:text="${schedule.section.sectionName}">
                        BSIT 3-1
                    </h5>

                    <p class="card-text">
                        <strong>Subject:</strong>
                        <span th:text="${schedule.subject.name}">
                            Web Development
                        </span>
                    </p>

                    <a class="btn btn-maroon btn-sm"
                       th:href="@{/faculty/classes/{id}(id=${schedule.section.id})}">
                        View Class List →
                    </a>

                </div>

            </div>

        </div>

    </div>

    <div class="alert alert-info"
         th:if="${#lists.isEmpty(schedules)}">

        No assigned classes yet.

    </div>

</div>

</body>
</html>
