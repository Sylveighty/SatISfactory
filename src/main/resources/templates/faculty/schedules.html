<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Schedule - PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="has-topbar">

<div th:replace="~{fragments/topbar :: topbar}"></div>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <header class="top-header">
            <h2>Faculty Portal</h2>
            <div class="header-right">
                <span sec:authentication="name"></span>
                <span class="role-badge faculty">Faculty</span>
            </div>
        </header>

        <main class="content-area">

            <div class="page-title">
                <h3>Schedule</h3>
                <p>Courses assigned per section for this term.</p>
            </div>

            <div th:if="${faculty == null}" class="alert alert-error">
                No faculty profile found. Please contact the administrator.
            </div>

            <div th:if="${faculty != null}" class="table-wrapper">
                <table class="sis-table">
                    <thead>
                        <tr>
                            <th>Section</th>
                            <th>Course</th>
                            <th>Day</th>
                            <th>Time</th>
                            <th>Room</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(schedules)}">
                            <td colspan="5" class="table-empty">No schedules assigned yet.</td>
                        </tr>
                        <tr th:each="sc : ${schedules}">
                            <td th:text="${sc.section.sectionName}"></td>
                            <td th:text="${sc.subject.code + ' - ' + sc.subject.name}"></td>
                            <td th:text="${sc.day}"></td>
                            <td th:text="${#temporals.format(sc.startTime, 'hh:mm a') + ' - ' + #temporals.format(sc.endTime, 'hh:mm a')}"></td>
                            <td th:text="${sc.room != null ? sc.room : '-'}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
</div>

</body>
</html>
