<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password — PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="role-login-page">

    <a th:href="@{/welcome}" class="back-link">← Back</a>

    <div class="role-login-container">
        <div class="role-login-card">

            <div class="role-login-header">
                <div class="role-login-seal">PUP</div>
                <div class="role-login-brand">
                    <span class="role-login-sis">SIS</span>
                    <span class="role-login-subtitle">FORGOT PASSWORD</span>
                </div>
            </div>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

            <p class="login-hint">
                Enter the email address linked to your account and we will send you a reset link.
            </p>

            <form th:action="@{/forgot-password}" method="post" class="role-login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email"
                           placeholder="your.email@example.com" required>
                </div>
                <button type="submit" class="btn-login">Send Reset Link</button>
            </form>

            <div class="login-links">
                <a th:href="@{/welcome}">Back to sign in options</a>
            </div>

        </div>
    </div>

</body>
</html>
