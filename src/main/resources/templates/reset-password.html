<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password — PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="role-login-page">

    <a th:href="@{/welcome}" class="back-link">← Back</a>

    <div class="role-login-container">
        <div class="role-login-card">

            <div class="role-login-header">
                <img th:src="@{/images/pup-seal.png}" alt="PUP" class="role-login-seal">
                <div class="role-login-brand">
                    <span class="role-login-sis">SIS</span>
                    <span class="role-login-subtitle">RESET PASSWORD</span>
                </div>
            </div>

            <!-- Invalid / expired token -->
            <div th:if="${tokenInvalid == true}">
                <div class="alert alert-error" th:text="${error}"></div>
                <div class="login-links">
                    <a th:href="@{/forgot-password}">Request a new reset link</a>
                </div>
            </div>

            <!-- Valid token - show the form -->
            <div th:if="${tokenInvalid != true}">

                <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

                <form th:action="@{/reset-password}" method="post"
                      class="role-login-form" id="resetForm">

                    <input type="hidden" name="token" th:value="${token}">

                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword"
                               placeholder="At least 8 characters, 1 uppercase, 1 number"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                               placeholder="Re-enter your new password" required>
                    </div>

                    <div id="mismatchHint" class="alert alert-error"
                         style="display:none; margin-bottom: 12px;">
                        Passwords do not match.
                    </div>

                    <div class="password-rules">
                        <p class="rules-title">Password must:</p>
                        <ul>
                            <li id="rule-length">Be at least 8 characters</li>
                            <li id="rule-upper">Contain at least one uppercase letter</li>
                            <li id="rule-number">Contain at least one number</li>
                        </ul>
                    </div>

                    <button type="submit" class="btn-login">Set New Password</button>

                </form>
            </div>

        </div>
    </div>

<script>
    const newPw      = document.getElementById('newPassword');
    const confirmPw  = document.getElementById('confirmPassword');
    const mismatch   = document.getElementById('mismatchHint');
    const ruleLength = document.getElementById('rule-length');
    const ruleUpper  = document.getElementById('rule-upper');
    const ruleNumber = document.getElementById('rule-number');

    if (newPw) {
        function mark(el, passing) {
            el.style.color      = passing ? '#2E7D32' : '';
            el.style.fontWeight = passing ? '600' : '';
        }

        newPw.addEventListener('input', () => {
            const v = newPw.value;
            mark(ruleLength, v.length >= 8);
            mark(ruleUpper,  /[A-Z]/.test(v));
            mark(ruleNumber, /[0-9]/.test(v));
            checkMatch();
        });

        confirmPw.addEventListener('input', checkMatch);

        function checkMatch() {
            const show = confirmPw.value.length > 0 && newPw.value !== confirmPw.value;
            mismatch.style.display = show ? 'block' : 'none';
        }

        document.getElementById('resetForm').addEventListener('submit', (e) => {
            if (newPw.value !== confirmPw.value) {
                e.preventDefault();
                mismatch.style.display = 'block';
            }
        });
    }
</script>

</body>
</html>
