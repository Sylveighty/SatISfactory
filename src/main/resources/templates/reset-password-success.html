<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Successful — PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="role-login-page">

    <div class="role-login-container">
        <div class="role-login-card">

            <div class="role-login-header">
                <div class="role-login-seal">PUP</div>
                <div class="role-login-brand">
                    <span class="role-login-sis">SIS</span>
                    <span class="role-login-subtitle">PASSWORD RESET</span>
                </div>
            </div>

            <div class="alert alert-success">
                Your password has been reset successfully.
            </div>

            <p class="login-hint">
                You can now sign in using your new password.
            </p>

            <div class="login-links">
                <a th:href="@{/welcome}">Go to sign in</a>
            </div>

        </div>
    </div>

</body>
</html>
