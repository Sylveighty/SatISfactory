<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="role-login-page">

    <a th:href="@{/welcome}" class="back-link">
        <span>&larr;</span>
        <span>Back</span>
    </a>

<div class="role-login-container">
    <div class="role-login-card">

        <div class="role-login-header">
            <div class="role-login-seal">PUP</div>
            <div class="role-login-brand">
                <span class="role-login-sis">SIS</span>
                <span class="role-login-subtitle">CHANGE PASSWORD</span>
            </div>
        </div>  

        <form th:action="@{/student/Change-password}" method="post"
              class="role-login-form">

            <div class="form-group">
                <label>Student Number</label>
                <input type="text" name="studentNumber" required>
            </div>

            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="currentPassword" required>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="newPassword" required>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirmPassword" required>
            </div>

            <button type="submit" class="btn-login">
                Change Password
            </button>
        </form>

    </div>
</div>

</body>
</html>
