<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enrollment Confirmation - PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="has-topbar">

<div th:replace="~{fragments/topbar :: topbar}"></div>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <header class="top-header">
            <h2>Student Portal</h2>
            <div class="header-right">
                <span sec:authentication="name"></span>
                <span class="role-badge student">Student</span>
            </div>
        </header>

        <main class="content-area">

            <div class="page-title">
                <h3>Registration Confirmation</h3>
                <p th:text="${schoolYear + ' . ' + semester}">2025-2026 . Second Semester</p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${info}" class="alert alert-info" th:text="${info}"></div>

            <div th:if="${student != null}">

                <div class="grades-header-box" style="margin-bottom: 18px;">
                    <div class="grades-header-name" th:text="${student.fullName}"></div>
                    <div class="grades-header-id" th:text="'(' + ${student.studentNumber} + ')'"></div>
                    <div style="margin-top:8px; font-size:13px; color:rgba(255,255,255,0.8);"
                         th:text="'Section: ' + (${student.section != null ? student.section.sectionName : 'Not assigned'})"></div>
                </div>

                <div th:if="${#lists.isEmpty(enrolledGrades)}" class="dash-empty">
                    No subjects enrolled for this semester yet.
                    <a th:href="@{/student/enrollment}" style="color: var(--maroon); margin-left: 8px;">Go to Enrollment</a>
                </div>

                <div th:if="${!#lists.isEmpty(enrolledGrades)}">

                    <div class="free-he-banner">
                        You are officially enrolled for S.Y.
                        <span th:text="${schoolYear}"></span> -
                        <span th:text="${semester}"></span>
                    </div>

                    <div class="table-wrapper" style="margin-top: 16px;">
                        <table class="sis-table">
                            <thead>
                                <tr>
                                    <th>Subject Code</th>
                                    <th>Description</th>
                                    <th>Units</th>
                                    <th>Lec</th>
                                    <th>Lab</th>
                                    <th>Grade</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="g : ${enrolledGrades}">
                                    <td th:text="${g.subject.code}"></td>
                                    <td th:text="${g.subject.name}"></td>
                                    <td th:text="${g.subject.units}"></td>
                                    <td th:text="${g.subject.lecHours}"></td>
                                    <td th:text="${g.subject.labHours}"></td>
                                    <td th:text="${g.finalGrade != null ? g.finalGrade : '-'}"></td>
                                    <td th:text="${g.gradeStatus != null ? g.gradeStatus : 'Enrolled'}"></td>
                                </tr>
                            </tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="2" style="text-align:right; font-weight:600;">Total Units:</td>
                                    <td th:text="${totalUnits}" style="font-weight:600;"></td>
                                    <td colspan="4"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>

                    <div class="enrollment-confirm-card" style="margin-top: 24px;">
                        <div class="enrollment-success-icon">✓</div>
                        <div class="enrollment-success-text">Enrollment recorded successfully.</div>
                        <div style="color: var(--text-muted); font-size: 13px;"
                             th:text="${schoolYear + ' - ' + semester}"></div>
                    </div>

                </div>

            </div>

        </main>
    </div>
</div>

</body>
</html>
