<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password - PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="has-topbar">

<div th:replace="~{fragments/topbar :: topbar}"></div>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <header class="top-header">
            <h2>Student Portal</h2>
            <div class="header-right">
                <span sec:authentication="name"></span>
                <span class="role-badge student">Student</span>
            </div>
        </header>

        <main class="content-area">

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <div class="page-title">
                <h3>Change Password</h3>
            </div>

            <div class="profile-card">
                <form th:action="@{/student/change-password}" method="post"
                      class="profile-form" id="changePasswordForm">

                    <div class="profile-row">
                        <label class="profile-label">Current Password :</label>
                        <input type="password" name="currentPassword"
                               class="profile-input" id="currentPassword"
                               placeholder="Enter your current password" required>
                    </div>

                    <div class="profile-row">
                        <label class="profile-label">New Password :</label>
                        <input type="password" name="newPassword"
                               class="profile-input" id="newPassword"
                               placeholder="At least 8 characters, 1 uppercase, 1 number"
                               required>
                    </div>

                    <div class="profile-row">
                        <label class="profile-label">Confirm New Password :</label>
                        <input type="password" name="confirmPassword"
                               class="profile-input" id="confirmPassword"
                               placeholder="Re-enter your new password" required>
                    </div>

                    <div id="mismatchHint" class="alert alert-error"
                         style="display:none; margin: 0 0 16px 0;">
                        Passwords do not match.
                    </div>

                    <div class="password-rules">
                        <p class="rules-title">Password must:</p>
                        <ul>
                            <li id="rule-length">Be at least 8 characters</li>
                            <li id="rule-upper">Contain at least one uppercase letter</li>
                            <li id="rule-number">Contain at least one number</li>
                        </ul>
                    </div>

                    <div class="profile-save-row">
                        <button type="submit" class="btn-save">Change Password</button>
                    </div>

                </form>
            </div>

        </main>
    </div>
</div>

<script>
    const newPw      = document.getElementById('newPassword');
    const confirmPw  = document.getElementById('confirmPassword');
    const mismatch   = document.getElementById('mismatchHint');
    const ruleLength = document.getElementById('rule-length');
    const ruleUpper  = document.getElementById('rule-upper');
    const ruleNumber = document.getElementById('rule-number');

    function mark(el, passing) {
        el.style.color      = passing ? '#2E7D32' : '';
        el.style.fontWeight = passing ? '600' : '';
    }

    newPw.addEventListener('input', () => {
        const v = newPw.value;
        mark(ruleLength, v.length >= 8);
        mark(ruleUpper,  /[A-Z]/.test(v));
        mark(ruleNumber, /[0-9]/.test(v));
        checkMatch();
    });

    confirmPw.addEventListener('input', checkMatch);

    function checkMatch() {
        const show = confirmPw.value.length > 0 && newPw.value !== confirmPw.value;
        mismatch.style.display = show ? 'block' : 'none';
    }

    document.getElementById('changePasswordForm').addEventListener('submit', (e) => {
        if (newPw.value !== confirmPw.value) {
            e.preventDefault();
            mismatch.style.display = 'block';
        }
    });
</script>

</body>
</html>
