<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard — PUP SIS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<body class="has-topbar">
<div th:replace="~{fragments/topbar :: topbar}"></div>
<div class="app-layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <header class="top-header">
            <h2>Student Dashboard</h2>
            <div class="header-right">
                <span>Welcome, <strong th:text="${username}">student1</strong></span>
                <span class="role-badge student">Student</span>
            </div>
        </header>

        <main class="content-area">
            <div class="page-title">
                <h3>Student Portal</h3>
                <p>Select a module from the sidebar to get started.</p>
            </div>
            <div class="dashboard-welcome">
                <p>Signed in as <strong th:text="${username}">student1</strong> &nbsp;·&nbsp;
                <span class="role-badge student">Student</span></p>
            </div>
        </main>
    </div>
</div>
</body>
</html>
